<svg xmlns="http://www.w3.org/2000/svg" width="1004" height="604" viewBox="0 0 1004 604" role="img" aria-labelledby="title desc">
  <title id="title">Vibelsland Free welcome screen</title>
  <desc id="desc">A frosted welcome panel on a blue gradient background.</desc>
  <defs>
    <linearGradient id="bg" x1="62" y1="70" x2="930" y2="552" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f7fbff"/>
      <stop offset=".32" stop-color="#dfe9ff"/>
      <stop offset=".78" stop-color="#7d91ff"/>
      <stop offset="1" stop-color="#4857ff"/>
    </linearGradient>
    <linearGradient id="panel" x1="155" y1="118" x2="752" y2="486" gradientUnits="userSpaceOnUse">
      <stop stop-color="#fbfdff" stop-opacity=".92"/>
      <stop offset=".58" stop-color="#e7edff" stop-opacity=".76"/>
      <stop offset="1" stop-color="#dde5ff" stop-opacity=".68"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="26" flood-color="#3552ff" flood-opacity=".16"/>
    </filter>
  </defs>
  <rect width="1004" height="604" rx="0" fill="#fff"/>
  <rect x="22" y="28" width="960" height="548" rx="31" fill="url(#bg)" filter="url(#soft)"/>
  <rect x="116" y="74" width="770" height="472" rx="31" fill="url(#panel)" stroke="#fff" stroke-width="3"/>
  <rect x="452" y="180" width="72" height="72" rx="20" fill="#eef8ff" stroke="#fff" stroke-width="3"/>
  <path d="M476 205l22 22-22 22" fill="none" stroke="#1b1d22" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M503 248h17" fill="none" stroke="#1b1d22" stroke-width="9" stroke-linecap="round"/>
  <text x="502" y="339" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="42" font-weight="700" fill="#050506">Welcome to Vibelsland</text>
  <rect x="326" y="388" width="350" height="58" rx="29" fill="#080808"/>
  <text x="501" y="426" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',Arial,sans-serif" font-size="22" font-weight="650" fill="#fff">Download macOS</text>
  <rect x="343" y="470" width="316" height="58" rx="29" fill="#eef2ff" fill-opacity=".22" stroke="#cbd3ef" stroke-width="2"/>
  <text x="501" y="508" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',Arial,sans-serif" font-size="21" font-weight="620" fill="#2c3040">Open after unzip</text>
</svg>
