<svg xmlns="http://www.w3.org/2000/svg" width="1004" height="604" viewBox="0 0 1004 604" role="img" aria-labelledby="title desc">
  <title id="title">Vibelsland Free workspace selection screen</title>
  <desc id="desc">A frosted project picker panel on a blue gradient background.</desc>
  <defs>
    <linearGradient id="bg" x1="62" y1="70" x2="930" y2="552" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f8fbff"/>
      <stop offset=".34" stop-color="#e3ecff"/>
      <stop offset=".78" stop-color="#8093ff"/>
      <stop offset="1" stop-color="#4755ff"/>
    </linearGradient>
    <linearGradient id="panel" x1="155" y1="118" x2="752" y2="486" gradientUnits="userSpaceOnUse">
      <stop stop-color="#fbfdff" stop-opacity=".92"/>
      <stop offset=".58" stop-color="#e8eeff" stop-opacity=".76"/>
      <stop offset="1" stop-color="#dfe6ff" stop-opacity=".68"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="26" flood-color="#3552ff" flood-opacity=".16"/>
    </filter>
  </defs>
  <rect width="1004" height="604" rx="0" fill="#fff"/>
  <rect x="22" y="28" width="960" height="548" rx="31" fill="url(#bg)" filter="url(#soft)"/>
  <rect x="116" y="74" width="770" height="472" rx="31" fill="url(#panel)" stroke="#fff" stroke-width="3"/>
  <text x="502" y="186" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="35" font-weight="700" fill="#050506">Select your workspace</text>
  <rect x="260" y="218" width="484" height="190" rx="24" fill="#eaf0ff" fill-opacity=".2" stroke="#cfd7ef" stroke-width="2"/>
  <rect x="305" y="250" width="31" height="31" rx="5" fill="#080808"/>
  <path d="M313 265l8 8 15-20" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="358" y="274" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',Arial,sans-serif" font-size="23" font-weight="650" fill="#050506">Codex session</text>
  <text x="635" y="274" text-anchor="end" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',Arial,sans-serif" font-size="22" font-weight="500" fill="#777b8d">local/codex</text>
  <rect x="305" y="303" width="31" height="31" rx="5" fill="none" stroke="#cfd7ef" stroke-width="2"/>
  <text x="358" y="327" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',Arial,sans-serif" font-size="23" font-weight="620" fill="#050506">Claude Code</text>
  <text x="635" y="327" text-anchor="end" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',Arial,sans-serif" font-size="22" font-weight="500" fill="#777b8d">local/claude</text>
  <rect x="305" y="356" width="31" height="31" rx="5" fill="none" stroke="#cfd7ef" stroke-width="2"/>
  <text x="358" y="380" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',Arial,sans-serif" font-size="23" font-weight="620" fill="#050506">Desktop app</text>
  <text x="635" y="380" text-anchor="end" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',Arial,sans-serif" font-size="22" font-weight="500" fill="#777b8d">local/status</text>
  <rect x="260" y="438" width="260" height="58" rx="29" fill="#eef2ff" fill-opacity=".22" stroke="#cbd3ef" stroke-width="2"/>
  <text x="390" y="476" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',Arial,sans-serif" font-size="22" font-weight="650" fill="#15171d">Open settings</text>
  <rect x="540" y="438" width="204" height="58" rx="29" fill="#080808"/>
  <text x="642" y="476" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',Arial,sans-serif" font-size="22" font-weight="650" fill="#fff">Continue</text>
</svg>
