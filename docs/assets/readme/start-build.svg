<svg xmlns="http://www.w3.org/2000/svg" width="1004" height="604" viewBox="0 0 1004 604" role="img" aria-labelledby="title desc">
  <title id="title">Vibelsland Free first task screen</title>
  <desc id="desc">A frosted task input panel on a blue gradient background.</desc>
  <defs>
    <linearGradient id="bg" x1="62" y1="70" x2="930" y2="552" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f7fbff"/>
      <stop offset=".34" stop-color="#e1ebff"/>
      <stop offset=".78" stop-color="#8193ff"/>
      <stop offset="1" stop-color="#4654ff"/>
    </linearGradient>
    <linearGradient id="panel" x1="155" y1="118" x2="752" y2="486" gradientUnits="userSpaceOnUse">
      <stop stop-color="#fbfdff" stop-opacity=".92"/>
      <stop offset=".58" stop-color="#e8eeff" stop-opacity=".76"/>
      <stop offset="1" stop-color="#dfe6ff" stop-opacity=".68"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="26" flood-color="#3552ff" flood-opacity=".16"/>
    </filter>
  </defs>
  <rect width="1004" height="604" rx="0" fill="#fff"/>
  <rect x="22" y="28" width="960" height="548" rx="31" fill="url(#bg)" filter="url(#soft)"/>
  <rect x="116" y="74" width="770" height="472" rx="31" fill="url(#panel)" stroke="#fff" stroke-width="3"/>
  <rect x="466" y="150" width="72" height="72" rx="20" fill="none" stroke="#1d2028" stroke-width="5"/>
  <path d="M487 201l30-30m0 0h-25m25 0v25" fill="none" stroke="#050506" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="502" y="296" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="40" font-weight="700" fill="#050506">Let's build</text>
  <text x="502" y="348" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',Arial,sans-serif" font-size="34" font-weight="650" fill="#777b8d">Keep status visible</text>
  <rect x="222" y="400" width="560" height="108" rx="28" fill="#fff" stroke="#dde1ec" stroke-width="2"/>
  <text x="255" y="455" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',Arial,sans-serif" font-size="25" font-weight="430" fill="#8d8d8d">Watch AI coding progress</text>
  <circle cx="281" cy="485" r="26" fill="#f2f2f2"/>
  <path d="M281 470v30m-15-15h30" fill="none" stroke="#050506" stroke-width="3" stroke-linecap="round"/>
  <circle cx="732" cy="455" r="28" fill="#080808"/>
  <path d="M732 469v-28m0 0l-13 13m13-13l13 13" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="242" y="548" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',Arial,sans-serif" font-size="18" font-weight="600" fill="#82868f">Local</text>
  <text x="700" y="548" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',Arial,sans-serif" font-size="18" font-weight="600" fill="#82868f">Top bar</text>
</svg>
